name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Test (pytest + rule_based evals)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      API_KEYS: "ci-test-key-do-not-use:ci-user"
      AGENT_DECISION_PROVIDER: "rule_based"
      AGENT_MULTI_STEP_PLANNING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-tests.db"
        run: python -m pytest -q

      - name: Run rule_based evaluation suite
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-evals.db"
        run: python -m evals.run --mode rule_based

      - name: Verify Alembic baseline migration
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-alembic-check.db"
        run: |
          python -m alembic upgrade head
          python -m alembic check

  postgres:
    name: PostgreSQL integration (optional backend)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16.14
        env:
          POSTGRES_USER: taskagent
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_DB: ci_taskagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskagent -d ci_taskagent_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      API_KEYS: "ci-test-key-do-not-use:ci-user"
      AGENT_DECISION_PROVIDER: "rule_based"
      AGENT_MULTI_STEP_PLANNING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run Alembic migration against PostgreSQL
        env:
          DATABASE_URL: "postgresql+psycopg://taskagent:ci-postgres-password@localhost:5432/ci_taskagent_test"
        run: |
          python -m alembic upgrade head
          python -m alembic check

      - name: Run PostgreSQL integration tests
        env:
          POSTGRES_TEST_DATABASE_URL: "postgresql+psycopg://taskagent:ci-postgres-password@localhost:5432/ci_taskagent_test"
        run: python -m pytest tests/test_postgres_integration.py -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t fastapi-ai-task-agent:ci .