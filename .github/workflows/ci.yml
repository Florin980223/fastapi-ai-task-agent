name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Test (pytest + rule_based/mocked-ollama evals)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      API_KEYS: "ci-test-key-do-not-use:ci-user"
      AGENT_DECISION_PROVIDER: "rule_based"
      AGENT_MULTI_STEP_PLANNING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-tests.db"
        run: python -m pytest -q

      - name: Run rule_based evaluation suite
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-evals.db"
        run: python -m evals.run --mode rule_based

      - name: Run mocked-ollama evaluation suite
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-evals-mocked-ollama.db"
        run: python -m evals.run --mode mocked-ollama

      - name: Verify Alembic baseline migration
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-alembic-check.db"
        run: |
          python -m alembic upgrade head
          python -m alembic check

  postgres:
    name: PostgreSQL integration (optional backend)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16.14
        env:
          POSTGRES_USER: taskagent
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_DB: ci_taskagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskagent -d ci_taskagent_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      API_KEYS: "ci-test-key-do-not-use:ci-user"
      AGENT_DECISION_PROVIDER: "rule_based"
      AGENT_MULTI_STEP_PLANNING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run Alembic migration against PostgreSQL
        env:
          DATABASE_URL: "postgresql+psycopg://taskagent:ci-postgres-password@localhost:5432/ci_taskagent_test"
        run: |
          python -m alembic upgrade head
          python -m alembic check

      - name: Run PostgreSQL integration tests
        env:
          POSTGRES_TEST_DATABASE_URL: "postgresql+psycopg://taskagent:ci-postgres-password@localhost:5432/ci_taskagent_test"
        run: python -m pytest tests/test_postgres_integration.py -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t fastapi-ai-task-agent:ci .

  deploy_smoke:
    name: Deployment smoke test (manual only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_dispatch is only a workflow-level trigger (see the `on:`
    # block above, shared with every other job) - without this job-level
    # condition, this job would also run on every push/PR like the jobs
    # above. This is the only job in this file that does not.
    if: github.event_name == 'workflow_dispatch'

    env:
      NETWORK_NAME: deploy-smoke-net
      PG_CONTAINER: pg-smoke
      APP_CONTAINER: app-smoke
      PG_USER: ci_deploy_smoke_user
      PG_PASSWORD: ci-deploy-smoke-password
      # Needed even for the plain `python -m alembic upgrade head` step
      # below, which runs directly on the runner, not in a container:
      # alembic/env.py imports app.database -> app.config, and
      # app.config.API_KEYS fails fast at import time if unset - the
      # same reason the `test`/`postgres` jobs above set this too. Two
      # throwaway entries: one for the pre-existing read-only smoke
      # checks, one dedicated to the isolated task-lifecycle check.
      API_KEYS: "ci-deploy-smoke-key:ci_user,ci-deploy-smoke-test-user-key:smoke_test_user"
      # Ephemeral, job-scoped database - name ends in _test, matching
      # the same safety convention tests/test_postgres_integration.py's
      # guards already enforce elsewhere in this project. Distinct from
      # the `postgres` job's ci_taskagent_test purely so the two jobs'
      # intent stays visually separate; there is no actual collision
      # risk either way (GitHub Actions jobs run on separate runners).
      PG_DB: ci_taskagent_smoke_test
      PG_HOST_PORT: 55433

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Build Docker image
        run: docker build -t fastapi-ai-task-agent:deploy-smoke .

      # Networking, explicit and correct: this job's steps run directly
      # on the runner VM (there is no `jobs.deploy_smoke.container:`
      # key), so a `services:` block would only publish a service
      # container's port to the runner's own localhost - it would give
      # a separately `docker run`-launched app container no way to
      # resolve it by name. Postgres and the app container are instead
      # both attached to this one user-defined bridge network, so Docker's
      # embedded DNS lets the app container address Postgres by its
      # container name (pg-smoke) - the runner itself (for the Alembic
      # step, which runs directly on the runner, not in a container)
      # reaches Postgres via its published host port on localhost
      # instead. Never `docker compose` here, so `down -v` never applies
      # and neither `agent_data` nor `postgres_data` (compose.yaml's
      # named volumes) are ever referenced.
      - name: Create temporary Docker network
        run: docker network create "$NETWORK_NAME"

      - name: Start ephemeral PostgreSQL
        run: |
          docker run -d --name "$PG_CONTAINER" \
            --network "$NETWORK_NAME" \
            -p "${PG_HOST_PORT}:5432" \
            -e POSTGRES_USER="$PG_USER" \
            -e POSTGRES_PASSWORD="$PG_PASSWORD" \
            -e POSTGRES_DB="$PG_DB" \
            postgres:16.14

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U "$PG_USER" -d "$PG_DB" >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 1
          done
          echo "PostgreSQL did not become ready in time" >&2
          exit 1

      - name: Run Alembic migration against the ephemeral database
        run: |
          export DATABASE_URL="postgresql+psycopg://${PG_USER}:${PG_PASSWORD}@localhost:${PG_HOST_PORT}/${PG_DB}"
          python -m alembic upgrade head
          python -m alembic check

      - name: Start the application container
        run: |
          docker run -d --name "$APP_CONTAINER" \
            --network "$NETWORK_NAME" \
            -p 8000:8000 \
            -e DATABASE_URL="postgresql+psycopg://${PG_USER}:${PG_PASSWORD}@${PG_CONTAINER}:5432/${PG_DB}" \
            -e API_KEYS="$API_KEYS" \
            -e AGENT_DECISION_PROVIDER="rule_based" \
            -e AGENT_MULTI_STEP_PLANNING="false" \
            fastapi-ai-task-agent:deploy-smoke
          # No --workers override - runs with the Dockerfile's baked-in
          # --workers 1, exactly as a real deployment would.

      - name: Wait for GET /ready
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready || echo "000")
            if [ "$status" = "200" ]; then
              echo "Application is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Application did not become ready in time" >&2
          exit 1

      - name: Run smoke test script
        run: |
          pwsh docker/smoke_test.ps1 \
            -Full \
            -BaseUrl "http://localhost:8000" \
            -ApiKey "ci-deploy-smoke-key" \
            -SmokeTestApiKey "ci-deploy-smoke-test-user-key"

      - name: Stop application container and verify graceful shutdown
        run: |
          docker stop --timeout 10 "$APP_CONTAINER"
          exit_code=$(docker inspect "$APP_CONTAINER" --format='{{.State.ExitCode}}')
          echo "app-smoke exited with code $exit_code"
          # A clean SIGTERM-driven shutdown (the exec-form CMD/lifespan
          # path this project relies on) exits 0; 137 would mean docker
          # had to force-kill it after the grace period instead.
          test "$exit_code" = "0"

      # Runs even if any step above failed (a bad smoke-test assertion,
      # a readiness timeout, etc.) - never leaves containers or the
      # temporary network behind. No `docker compose down -v` anywhere
      # in this job (it never uses Compose), and neither `agent_data`
      # nor `postgres_data` are ever referenced - only this job's own
      # pg-smoke/app-smoke containers and deploy-smoke-net network.
      - name: Clean up containers and network
        if: always()
        run: |
          docker rm -f "$APP_CONTAINER" >/dev/null 2>&1 || true
          docker rm -f "$PG_CONTAINER" >/dev/null 2>&1 || true
          docker network rm "$NETWORK_NAME" >/dev/null 2>&1 || true